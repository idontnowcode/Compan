name: Build Rested.exe

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Rested `
            --add-data "assets;assets" `
            --paths src `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rested-windows
          path: dist/Rested.exe
          retention-days: 30
